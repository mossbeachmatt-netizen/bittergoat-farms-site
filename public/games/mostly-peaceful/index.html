// Pre-decode base64 → ArrayBuffer at startup (no user gesture needed for this)
const _WAV_ARRAYBUF = (()=>{
  try{
    const bin=atob(_WAV_B64), buf=new ArrayBuffer(bin.length), v=new Uint8Array(buf);
    for(let i=0;i<bin.length;i++) v[i]=bin.charCodeAt(i);
    return buf;
  }catch(e){ return null; }
})();

let _actx=null, _abuf=null;

const AUDIO = {
  muted:false, dbg:'waiting',
  init(){
    // Called synchronously from tap handler — critical for iOS/Safari
    if(_actx) return;
    if(!_WAV_ARRAYBUF){ this.dbg='no-arraybuf'; return; }
    try{
      _actx = new (window.AudioContext||window.webkitAudioContext)();
      this.dbg='ctx:'+_actx.state;
      // slice() because decodeAudioData detaches the source buffer
      _actx.decodeAudioData(
        _WAV_ARRAYBUF.slice(),
        buf=>{ _abuf=buf; this.dbg='loaded'; },
        err=>{ this.dbg='decode-err'; }
      );
    }catch(e){ this.dbg='ctx-err:'+e.name; }
  },
  play(){
    if(this.muted){ this.dbg='muted'; return; }
    if(!_actx){ this.dbg='no-ctx'; return; }
    if(!_abuf){ this.dbg='no-buf('+_actx.state+')'; return; }
    try{
      if(_actx.state==='suspended') _actx.resume();
      const src=_actx.createBufferSource();
      src.buffer=_abuf;
      src.playbackRate.value=0.9+Math.random()*0.2;
      const g=_actx.createGain(); g.gain.value=0.5;
      src.connect(g); g.connect(_actx.destination);
      src.start(0);
      this.dbg='ok';
    }catch(e){ this.dbg='play-err:'+e.name; }
  },
};

// ── Layout Constants ──
const TILE      = 48;
const COLS      = 10;
const ROWS      = 12;
const HUD_TOP   = 64;

// ── Road / Path Definitions ──
// Three winding paths, two exit points.
// PATH 1 (left entry)   → left exit  (2,11)
// PATH 2 (center entry) → right exit (7,11)
// PATH 3 (right entry)  → right exit (7,11) via outer loop
const ROAD_SET = new Set([
  // PATH 1 — left side S-curve
  '1,0','1,1','1,2','1,3',
  '2,3','3,3',
  '3,4','3,5','3,6','3,7',
  '1,7','2,7',
  '1,8','1,9','1,10',
  '2,10',
  '2,11',
  // PATH 2 — center loop
  '5,0','5,1','5,2','5,3','5,4',
  '6,4','7,4',
  '7,5','7,6','7,7',
  '6,7','6,8','6,9','6,10',
  '7,10','7,11',
  // PATH 3 — right outer loop
  '8,0','8,1','8,2','8,3','8,4','8,5',
  '9,5',
  '9,6','9,7','9,8',
  '8,8','7,8',
  '7,9',           // col 7 rows 9-11 shared with PATH 2 approach
]);

const ENTRY_TILES = new Set(['1,0','5,0','8,0']);
const EXIT_SET    = new Set(['2,11','7,11']);

function isRoad(c,r){ return ROAD_SET.has(`${c},${r}`); }
function isEntry(c,r){ return ENTRY_TILES.has(`${c},${r}`); }
function isExit(c,r){ return EXIT_SET.has(`${c},${r}`); }
function toPx(c,r){ return { x: c*TILE+TILE/2, y: HUD_TOP+r*TILE+TILE/2 }; }

// Waypoint arrays — enemies follow these pixel coords in order
const PATH1 = [[1,0],[1,3],[3,3],[3,7],[1,7],[1,10],[2,10],[2,11]].map(([c,r])=>toPx(c,r));
const PATH2 = [[5,0],[5,4],[7,4],[7,7],[6,7],[6,10],[7,10],[7,11]].map(([c,r])=>toPx(c,r));
const PATH3 = [[8,0],[8,5],[9,5],[9,8],[7,8],[7,11]].map(([c,r])=>toPx(c,r));
const ALL_PATHS = [PATH1, PATH2, PATH3];

function canPlace(col,row){
  if(col<0||col>=COLS||row<0||row>=ROWS) return false;
  if(G.towers.some(t=>t.col===col&&t.row===row)) return false;
  const key=`${col},${row}`;
  if(G.selUnit==='barricade'){
    // Barricades go ON road tiles — but not entry or exit tiles
    return isRoad(col,row) && !ENTRY_TILES.has(key) && !EXIT_SET.has(key);
  }
  // All other towers go on non-road tiles only
  return !isRoad(col,row);
}

//  ENTITY CLASSES
// ══════════════════════════════

class Enemy {
  constructor(type, path){
    const d = EDEFS[type];
    this.type  = type;
    this.path  = path;
    this.pidx  = 0;
    this.x     = path[0].x;
    this.y     = path[0].y;
    this.spd   = d.spd;
    this.maxHP = d.hp;
    this.hp    = d.hp;
    this.r     = d.r;
    this.col   = d.col;
    this.reward= d.reward;
    this.rage  = 0;
    this.rageR = d.rageR;
    this.raging= false;
    this.stunT = 0;
    this.slowT = 0;
    this.dead  = false;
    this.escaped=false;
    this.flash = 0;
    this.ang   = Math.PI/2;
    this.dist  = 0;  // progress along path (for tower targeting)
    this._killCounted = false;
    this.animT = 0;  // pixel art animation timer
    // Molotov thrower attack state
    if(type==='molotov'){
      this.attackTarget = null;  // tower being attacked
      this.attackTimer  = 0;
      this.throwing     = false; // arm-raised animation state
      this.throwT       = 0;
    }
  }

  update(dt){
    if(this.dead||this.escaped) return;
    if(this.stunT>0){ this.stunT-=dt; return; }
    this.flash = Math.max(0, this.flash - dt*6);
    this.slowT = Math.max(0, this.slowT - dt);

    // ── MOLOTOV THROWER: stop and attack nearby towers/squads ──
    if(this.type==='molotov'){
      const d = EDEFS.molotov;
      // Find closest alive tower (squad or police tower) in attack range
      const target = G.towers.find(t=>
        !t.dead && (t.type==='tower'||t.type==='squad') &&
        Math.hypot(t.x-this.x, t.y-this.y) <= d.attackRange
      );
      if(target){
        this.attackTarget = target;
        this.throwing = true;
        // Face the target
        this.ang = Math.atan2(target.y-this.y, target.x-this.x);
        this.attackTimer -= dt;
        this.throwT = Math.max(0, this.throwT - dt);
        if(this.attackTimer<=0){
          this.attackTimer = d.attackCd;
          this.throwT = 0.35; // arm-raised duration
          // Launch a molotov projectile
          G.mprojs.push(new MolotovProjectile(this.x, this.y, target));
        }
        return; // don't move while attacking
      } else {
        this.attackTarget = null;
        this.throwing = false;
      }
    }

    // ── Normal movement ──
    const spd = this.spd * (this.raging?1.5:1) * (this.slowT>0?0.4:1);
    this.animT += spd * dt * 0.07;
    const wp  = this.path[this.pidx];
    const dx  = wp.x - this.x, dy = wp.y - this.y;
    const dd  = Math.hypot(dx,dy);
    if(dd>0) this.ang = Math.atan2(dy,dx);

    const step = spd*dt;
    if(dd <= step){
      this.x = wp.x; this.y = wp.y;
      this.pidx++;
      if(this.pidx >= this.path.length){ this.escaped=true; return; }
    } else {
      this.x += (dx/dd)*step;
      this.y += (dy/dd)*step;
      this.dist += step;
    }

    this.rage = Math.min(100, this.rage + this.rageR*dt*10);
    if(this.rage>=100 && !this.raging) this.raging=true;
  }

  hit(dmg){
    this.hp -= dmg;
    this.flash = 1;
    this.rage  = Math.min(100, this.rage+12);
    if(this.hp<=0){ this.dead=true; }
  }
}

class Tower {
  constructor(type,col,row){
    const d = TDEFS[type];
    this.type  = type;
    this.col   = col;
    this.row   = row;
    this.x     = col*TILE+TILE/2;
    this.y     = HUD_TOP+row*TILE+TILE/2;
    this.range = d.range*TILE;
    this.dmg   = d.dmg;
    this.rof   = d.rof;
    this.cd    = 0;
    this.lv    = 1;
    this.ang   = 0;
    this.muzz  = 0;
    this.col2  = d.col;
    // HP: tower=4 hits, squad=2 hits, others=999
    this.maxHP = type==='tower' ? 4 : type==='squad' ? 2 : 999;
    this.hp    = this.maxHP;
    this.hitFlash = 0;
    this.dead  = false;
  }

  update(dt, enemies){
    this.cd      = Math.max(0, this.cd-dt);
    this.muzz    = Math.max(0, this.muzz-dt*10);
    this.hitFlash= Math.max(0, (this.hitFlash||0)-dt*5);

    if(this.type==='barricade'){
      for(const e of enemies){
        if(e.dead||e.escaped) continue;
        if(Math.hypot(e.x-this.x,e.y-this.y)<this.range) e.slowT=0.5;
      }
      return null;
    }

    // Water Cannon beam (Lv3)
    if(this.waterCannon){
      this.beamCd = Math.max(0, this.beamCd-dt);
      if(this.beamActive){
        this.beamTimer -= dt;
        if(!this.beamTarget||this.beamTarget.dead||this.beamTarget.escaped){
          this.beamActive=false; this.beamTarget=null;
        } else {
          this.beamTarget.slowT = 0.2; // keep refreshing slow
          this.ang = Math.atan2(this.beamTarget.y-this.y, this.beamTarget.x-this.x);
        }
        if(this.beamTimer<=0){ this.beamActive=false; this.beamTarget=null; }
      }
      if(!this.beamActive && this.beamCd<=0){
        // Find closest enemy in range
        let best=null, bestD=Infinity;
        for(const e of enemies){
          if(e.dead||e.escaped) continue;
          const d=Math.hypot(e.x-this.x,e.y-this.y);
          if(d<=this.range && d<bestD){ best=e; bestD=d; }
        }
        if(best){
          this.beamActive=true; this.beamTarget=best;
          this.beamTimer=3; this.beamCd=5;
          this.ang=Math.atan2(best.y-this.y, best.x-this.x);
        }
      }
      return null;
    }

    // Find target: prioritise furthest along path
    let best=null, bestProg=-1;
    for(const e of enemies){
      if(e.dead||e.escaped) continue;
      if(Math.hypot(e.x-this.x,e.y-this.y)<=this.range){
        const prog = e.pidx*1000+e.dist;
        if(prog>bestProg){ best=e; bestProg=prog; }
      }
    }

    if(best) this.ang=Math.atan2(best.y-this.y, best.x-this.x);

    if(best && this.cd<=0){
      this.cd=1/this.rof;
      this.muzz=1;
      return {x:this.x,y:this.y,target:best,dmg:this.dmg,ttype:this.type};
    }
    return null;
  }

  // Upgrade names by level-after-upgrade
  upgName(){ return ['Live Rounds','Water Cannon'][this.lv-1] || null; }
  upgCost(){ return [120, 200][this.lv-1] || 0; }
  repairCost(){
    if(this.hp>=this.maxHP) return 0;
    return Math.ceil((this.maxHP-this.hp) * (this.type==='tower'?25:20));
  }

  hitByMolotov(){
    const dmg = EDEFS.molotov[this.type==='tower'?'dmgTower':'dmgSquad'] || 1;
    this.hp -= dmg;
    this.hitFlash = 1;
    if(this.hp<=0){ this.dead=true; addMsg('💥 Destroyed!', this.x, this.y-20, '#FF5722'); }
  }

  upgrade(){
    if(this.lv>=3) return false;
    this.lv++;
    if(this.lv===2){
      // Live Rounds: +50% rate of fire, +30% damage
      this.rof *= 1.5;
      this.dmg = Math.round(this.dmg*1.3);
    } else if(this.lv===3){
      // Water Cannon: replaces shooting with a slow beam
      this.waterCannon = true;
      this.beamCd      = 0;
      this.beamActive  = false;
      this.beamTarget  = null;
      this.beamTimer   = 0;
    }
    return true;
  }
}

class Projectile {
  constructor(sx,sy,target,dmg,ttype){
    this.x=sx; this.y=sy; this.ox=sx; this.oy=sy;
    this.target=target; this.dmg=dmg;
    this.spd=310;
    this.done=false;
    this.pcol = ttype==='horse' ? '#CE93D8' : ttype==='tower' ? '#82B1FF' : '#90CAF9';
    this.pr   = ttype==='tower' ? 5 : 3;
  }

  update(dt){
    if(this.done) return null;
    if(this.target.dead||this.target.escaped){ this.done=true; return null; }
    const dx=this.target.x-this.x, dy=this.target.y-this.y;
    const dd=Math.hypot(dx,dy);
    const step=this.spd*dt;
    if(dd<=step){
      this.done=true;
      this.target.hit(this.dmg);
      return {hit:true,x:this.target.x,y:this.target.y,col:this.target.col};
    }
    this.x+=(dx/dd)*step; this.y+=(dy/dd)*step;
    return null;
  }
}

class Particle {
  constructor(x,y,col,big=false){
    this.x=x; this.y=y;
    this.vx=(Math.random()-.5)*(big?280:180);
    this.vy=(Math.random()-.5)*(big?280:180)-40;
    this.life=0.5+Math.random()*0.4;
    this.ml=this.life;
    this.r=big?(5+Math.random()*6):(2+Math.random()*4);
    this.col=col;
    this.done=false;
  }
  update(dt){
    this.x+=this.vx*dt; this.y+=this.vy*dt;
    this.vy+=380*dt;
    this.life-=dt;
    if(this.life<=0) this.done=true;
  }
}

// ── Molotov projectile — arcs from thrower to tower ──
class MolotovProjectile {
  constructor(sx,sy,target){
    this.x=sx; this.y=sy;
    this.sx=sx; this.sy=sy;
    this.target=target;
    this.tx=target.x; this.ty=target.y;
    this.t=0;        // 0→1 progress
    this.dur=0.7;    // flight time seconds
    this.done=false;
    this.rot=0;
  }
  update(dt){
    if(this.done) return;
    // Re-acquire target position if tower moved (it won't, but guards dead check)
    if(this.target.dead){ this.done=true; return; }
    this.t = Math.min(1, this.t + dt/this.dur);
    this.rot += dt*8;
    const u=this.t;
    // Lerp x linearly, arc y with a parabola
    this.x = this.sx + (this.tx-this.sx)*u;
    const arcH = 55;
    this.y = this.sy + (this.ty-this.sy)*u - arcH*Math.sin(Math.PI*u);
    if(this.t>=1){
      this.done=true;
      // Damage the tower
      if(!this.target.dead) this.target.hitByMolotov();
      // Spawn fire zone
      G.fires.push(new FireZone(this.tx, this.ty));
      // Spawn fire particles
      for(let i=0;i<14;i++) G.parts.push(new Particle(this.tx,this.ty,'#FF6D00',true));
    }
  }
}

// ── Fire zone — lingers on the ground after a molotov hits ──
class FireZone {
  constructor(x,y){
    this.x=x; this.y=y;
    this.r=20;
    this.life=4.0; this.ml=4.0;
    this.done=false;
    this.flicker=0;
  }
  update(dt){
    this.life-=dt;
    this.flicker+=dt*12;
    if(this.life<=0) this.done=true;
  }
}

function resetGame(){
  G.state='title'; G.currency=150; G.stability=100;
  G.waveIdx=0; G.waveTimer=0;
  G.interWave=true; G.interTimer=5;
  G.enemies=[]; G.towers=[]; G.projs=[]; G.mprojs=[]; G.fires=[]; G.parts=[];
  G.selUnit='squad'; G.selTower=null; G.hoverCell=null;
  G.abilities={ flashbang:{cd:0,max:20}, chopper:{cd:0,max:35} };
  G.spawnQ=[]; G.nightLvl=0; G.escapedTotal=0; G.kills=0;
  G.waveTrans=0; G.chopperFX=0; G.flashFX=0; G.msgs=[];
  mapLayer=null; // force map cache rebuild
}

function startGame(){ G.state='playing'; G.interWave=true; G.interTimer=5; }

function initWave(idx){
  const wv = WAVES[idx];
  G.spawnQ=[];
  // Wave 1 = base count. Each subsequent wave doubles the enemy count.
  // Spawn interval shrinks proportionally so wave duration stays manageable.
  const mult   = Math.pow(2, idx);          // 1× / 2× / 4× / 8× / 16×
  const ivScale= Math.max(0.35, 1/mult);   // interval shrinks but floors at 0.35s
  let t=0.5;
  for(const sp of wv.spawns){
    const count = sp.n * mult;
    const iv    = Math.max(0.35, sp.iv * ivScale);
    for(let i=0;i<count;i++){
      // Distribute across all 3 paths evenly when counts are large
      const path = (sp.p + Math.floor(i * 3 / count)) % 3;
      G.spawnQ.push({ timer:t, type:sp.t, path });
      t += iv + (Math.random()-.5)*0.3;
    }
  }
  G.spawnQ.sort((a,b)=>a.timer-b.timer);
  G.waveTimer=0;
  G.nightLvl = wv.nightMod;
}

function spawnEnemy(type,pi){
  const path = ALL_PATHS[pi % ALL_PATHS.length];
  G.enemies.push(new Enemy(type,path));
}

function useAbility(name){
  const ab=G.abilities[name];
  if(ab.cd>0) return;
  if(name==='flashbang'){
    for(const e of G.enemies) if(!e.dead&&!e.escaped){ e.stunT=3; }
    for(let i=0;i<30;i++) G.parts.push(new Particle(W/2,HUD_TOP+ROWS*TILE/2,'#FFD740',true));
    G.flashFX=0.5;
    ab.cd=ab.max;
    addMsg('💥 FLASHBANG!',W/2,HUD_TOP+60,'#FFD740');
  } else if(name==='chopper'){
    for(const e of G.enemies) if(!e.dead&&!e.escaped){ e.slowT=7; }
    G.chopperFX=5;
    ab.cd=ab.max;
    addMsg('🚁 CHOPPER DEPLOYED',W/2,HUD_TOP+60,'#90CAF9');
  }
}

function addMsg(txt,x,y,col){
  G.msgs.push({txt,x,y,col,life:2.5,ml:2.5,vy:-30});
}

function endGame(win){
  G.state = win?'win':'gameover';
}

// ══════════════════════════════
//  GAME LOOP UPDATE
// ══════════════════════════════

function update(dt){
  if(G.state!=='playing') return;

  G.pulseT += dt;
  G.waveTrans = Math.max(0, G.waveTrans-dt*1.5);
  G.flashFX  = Math.max(0, G.flashFX-dt*3);
  G.chopperFX= Math.max(0, G.chopperFX-dt);

  for(const ab of Object.values(G.abilities)) ab.cd=Math.max(0,ab.cd-dt);

  // Messages
  for(const m of G.msgs){ m.y+=m.vy*dt; m.life-=dt; }
  G.msgs=G.msgs.filter(m=>m.life>0);

  // Inter-wave countdown
  if(G.interWave){
    G.interTimer-=dt;
    if(G.interTimer<=0){
      G.interWave=false;
      initWave(G.waveIdx);
      G.waveTrans=3;
    }
    // Still update particles etc
    updateEntities(dt);
    return;
  }

  // Spawn from queue
  G.waveTimer+=dt;
  while(G.spawnQ.length>0 && G.spawnQ[0].timer<=G.waveTimer){
    const sp=G.spawnQ.shift();
    spawnEnemy(sp.type,sp.path);
  }

  // Update enemies
  for(const e of G.enemies) e.update(dt);

  // Process dead/escaped
  let escaped=0;
  G.enemies=G.enemies.filter(e=>{
    if(e.dead){ G.kills++; G.currency+=e.reward; addMsg(`+$${e.reward}`,e.x,e.y-20,'#FFD740'); return false; }
    if(e.escaped){ escaped++; return false; }
    return true;
  });
  if(escaped>0){
    G.escapedTotal+=escaped;
    G.stability=Math.max(0, G.stability - escaped*(100/12));
    if(G.stability<=0){ endGame(false); return; }
  }

  // Towers — update and cull destroyed ones
  for(const t of G.towers){
    const shot=t.update(dt,G.enemies);
    if(shot){ G.projs.push(new Projectile(shot.x,shot.y,shot.target,shot.dmg,shot.ttype)); AUDIO.play(); }
  }
  G.towers = G.towers.filter(t=>!t.dead);

  // Molotov projectiles
  for(const mp of G.mprojs) mp.update(dt);
  G.mprojs = G.mprojs.filter(mp=>!mp.done);

  // Fire zones (visual + slow any enemy inside)
  for(const f of G.fires){
    f.update(dt);
    for(const e of G.enemies){
      if(!e.dead&&!e.escaped&&Math.hypot(e.x-f.x,e.y-f.y)<f.r) e.slowT=0.4;
    }
  }
  G.fires = G.fires.filter(f=>!f.done);

  // Regular projectiles
  for(const p of G.projs){
    const hit=p.update(dt);
    if(hit&&hit.hit){
      for(let i=0;i<7;i++) G.parts.push(new Particle(hit.x,hit.y,hit.col));
    }
  }
  G.projs=G.projs.filter(p=>!p.done);

  updateEntities(dt);

  // Wave complete?
  if(G.spawnQ.length===0 && G.enemies.length===0){
    if(G.waveIdx>=WAVES.length-1){ endGame(true); return; }
    G.waveIdx++;
    G.interWave=true;
    G.interTimer=G.interDur;
    G.stability=Math.min(100,G.stability+6);
    const bonus=20+G.waveIdx*15;
    G.currency+=bonus;
    addMsg(`Wave cleared! +$${bonus}`,W/2,H*0.4,'#4CAF50');
  }
}

function updateEntities(dt){
  for(const p of G.parts) p.update(dt);
  G.parts=G.parts.filter(p=>!p.done);
}

const canvas=document.getElementById('gc');

function setupCanvas(){

function rr(x,y,w,h,r,fill,stroke,lw=2){
  ctx.beginPath(); ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
}

function txt(t,x,y,font,col,align='center',base='middle'){

  ctx.textAlign=align; ctx.textBaseline=base;
  ctx.fillText(t,x,y);
}

function txtOut(t,x,y,font,fill,stroke,sw=3,align='center'){

  ctx.lineJoin='round'; ctx.lineWidth=sw; ctx.strokeStyle=stroke;
  ctx.strokeText(t,x,y);
  ctx.fillStyle=fill; ctx.fillText(t,x,y);
}

// ══════════════════════════════
//  BUILDING CLUSTER SYSTEM
// ══════════════════════════════

let BUILDINGS = [];
const TILE_BLDG = {};
let mapLayer = null;

// Mulberry32 PRNG — fast, deterministic from seed
function mkRand(seed){
  let s=seed>>>0;
  return ()=>{
    s+=0x6D2B79F5;
    let t=Math.imul(s^(s>>>15),1|s);
    t^=t+Math.imul(t^(t>>>7),61|t);
    return((t^(t>>>14))>>>0)/4294967296;
  };
}

// Vary a hex color ±range per channel
function varyHex(hex,rand,range=14){
  const ri=parseInt(hex.slice(1,3),16),gi=parseInt(hex.slice(3,5),16),bi=parseInt(hex.slice(5,7),16);
  const cl=v=>Math.max(0,Math.min(255,v));
  return `rgb(${cl(ri+Math.round((rand()-.5)*range*2))},${cl(gi+Math.round((rand()-.5)*range*2))},${cl(bi+Math.round((rand()-.5)*range*2))})`;
}

const SIGN_NAMES=['DELI','BODEGA','LAUNDRY','PIZZA','PHARMACY','BAKERY','DINER',
                  'BARBER','24HR','MARKET','NAILS','SUBS','CAFE','PAWN','LIQUOR'];

// Greedy chunking: iterate tiles left→right top→bottom, greedily assign 2×2/2×1/1×2/1×1
function chunkBuildings(){
  BUILDINGS.length=0;
  Object.keys(TILE_BLDG).forEach(k=>delete TILE_BLDG[k]);
  for(let row=0;row<ROWS;row++){
    for(let col=0;col<COLS;col++){
      if(isRoad(col,row)) continue;
      const key=`${col},${row}`;
      const seed=(col*2053+row*1031)>>>0;
      // Alternate between the two house images based on seed
      const style=(seed%2===0)?'houseStone':'houseCream';
      TILE_BLDG[key]=BUILDINGS.length;
      BUILDINGS.push({col,row,w:1,h:1,tiles:[[col,row]],seed,style});
    }
  }
}

// ── Per-style draw functions: bitmap house images ────────────────────────
function bldHouseStone(mc,x,y,w,h,seed){ _drawHouseImg(mc,x,y,w,h,0,seed); }
function bldHouseCream(mc,x,y,w,h,seed){ _drawHouseImg(mc,x,y,w,h,1,seed); }

function _drawHouseImg(mc,x,y,w,h,idx,seed){
  const img=_HOUSE_IMGS[idx];
  if(img.complete && img.naturalWidth>0){
    // Draw the full image scaled to fit this tile exactly — no cropping
    mc.drawImage(img, 0, 0, img.naturalWidth, img.naturalHeight, x, y, w, h);
  } else {
    mc.fillStyle=idx===0?'#D4A870':'#F2E4C0';
    mc.fillRect(x,y,w,h);
    img.onload=()=>{ mapLayer=null; };
  }
}

// ── Offscreen map cache ──────────────────────────────────────────────────────

function buildMapCache(){
  chunkBuildings();
  const mdpr=Math.min(window.devicePixelRatio||1,2);
  mapLayer=document.createElement('canvas');
  mapLayer.width=W*mdpr; mapLayer.height=H*mdpr;
  const mc=mapLayer.getContext('2d');
  mc.scale(mdpr,mdpr);

  // ── Grass ground base ──────────────────────────────────────────────────
  mc.fillStyle='#4A8C3F'; mc.fillRect(0,HUD_TOP,W,ROWS*TILE);

  // Draw grass texture on every non-road tile (placeable + sidewalk)
  function drawGrassTile(gx,gy,col,row){
    const rand=mkRand((col*1031+row*503)>>>0);
    // Base grass
    mc.fillStyle='#4A8C3F'; mc.fillRect(gx,gy,TILE,TILE);
    // Subtle variation patches
    const shades=['#4E9442','#468A3C','#52984A','#437E38'];
    for(let i=0;i<6;i++){
      mc.fillStyle=shades[Math.floor(rand()*shades.length)];
      const px=gx+Math.floor(rand()*(TILE-8));
      const py=gy+Math.floor(rand()*(TILE-8));
      mc.fillRect(px,py,Math.floor(rand()*10)+4,Math.floor(rand()*8)+3);
    }
    // Short grass blade strokes
    mc.strokeStyle='rgba(60,120,40,0.5)'; mc.lineWidth=1;
    for(let i=0;i<8;i++){
      const bx=gx+Math.floor(rand()*TILE);
      const by=gy+Math.floor(rand()*TILE);
      const h2=Math.floor(rand()*5)+3;
      mc.beginPath();
      mc.moveTo(bx,by+h2);
      mc.lineTo(bx+Math.floor(rand()*3)-1,by);
      mc.stroke();
    }
    // Lighter highlight blades
    mc.strokeStyle='rgba(120,200,80,0.35)'; mc.lineWidth=0.5;
    for(let i=0;i<5;i++){
      const bx=gx+Math.floor(rand()*TILE);
      const by=gy+Math.floor(rand()*TILE);
      mc.beginPath();
      mc.moveTo(bx,by+4); mc.lineTo(bx,by); mc.stroke();
    }
    // Subtle dark edge to separate tiles slightly
    mc.strokeStyle='rgba(0,0,0,0.06)'; mc.lineWidth=0.5;
    mc.strokeRect(gx,gy,TILE,TILE);
  }

  for(let row=0;row<ROWS;row++) for(let col=0;col<COLS;col++){
    if(isRoad(col,row)) continue;
    const nearRoad=isRoad(col-1,row)||isRoad(col+1,row)||isRoad(col,row-1)||isRoad(col,row+1);
    if(nearRoad){
      // Placeable sidewalk tiles → green grass
      drawGrassTile(col*TILE, HUD_TOP+row*TILE, col, row);
    }
  }

  // House images on inner building tiles (not road-adjacent)
  for(const bldg of BUILDINGS){
    const bx=bldg.col*TILE, by2=HUD_TOP+bldg.row*TILE;
    const bw=bldg.w*TILE, bh=bldg.h*TILE;
    // Skip if this tile is road-adjacent (should be grass instead)
    if(isRoad(bldg.col-1,bldg.row)||isRoad(bldg.col+1,bldg.row)||
       isRoad(bldg.col,bldg.row-1)||isRoad(bldg.col,bldg.row+1)) continue;
    mc.save();
    mc.beginPath();
    for(const [tc,tr] of bldg.tiles) mc.rect(tc*TILE,HUD_TOP+tr*TILE,TILE,TILE);
    mc.clip();
    switch(bldg.style){
      case 'houseStone': bldHouseStone(mc,bx,by2,bw,bh,bldg.seed); break;
      case 'houseCream': bldHouseCream(mc,bx,by2,bw,bh,bldg.seed); break;
    }
    mc.restore();
  }

  // Roads — drawn on top of everything
  for(let row=0;row<ROWS;row++) for(let col=0;col<COLS;col++){
    if(!isRoad(col,row)) continue;
    const rx=col*TILE, ry=HUD_TOP+row*TILE;

    // Dark asphalt base — near black with subtle warm tint
    mc.fillStyle='#1E1E1E'; mc.fillRect(rx,ry,TILE,TILE);

    // Subtle asphalt texture — faint lighter flecks
    mc.fillStyle='rgba(255,255,255,0.03)';
    mc.fillRect(rx+4, ry+8,  TILE-8, 2);
    mc.fillRect(rx+6, ry+22, TILE-12, 1);
    mc.fillRect(rx+2, ry+36, TILE-6,  2);

    // Kerb edge — slightly lighter rim around each road tile
    mc.strokeStyle='rgba(80,80,80,0.5)'; mc.lineWidth=1;
    mc.strokeRect(rx,ry,TILE,TILE);

    const rL=isRoad(col-1,row),rR=isRoad(col+1,row),rU=isRoad(col,row-1),rD=isRoad(col,row+1);

    // Yellow dashed centre line
    mc.strokeStyle='#E8C840'; mc.lineWidth=2; mc.setLineDash([7,5]);
    if(rL||rR){
      mc.beginPath();
      mc.moveTo(rx,ry+TILE/2);
      mc.lineTo(rx+TILE,ry+TILE/2);
      mc.stroke();
    }
    if(rU||rD){
      mc.beginPath();
      mc.moveTo(rx+TILE/2,ry);
      mc.lineTo(rx+TILE/2,ry+TILE);
      mc.stroke();
    }
    mc.setLineDash([]);
  }
}

function drawMap(){
  if(!mapLayer) buildMapCache();
  ctx.drawImage(mapLayer,0,0,W,H);
  // Entry/exit drawn live (they pulse/animate)
  const pulse=0.6+0.4*Math.sin(G.pulseT*3);
  drawEntryMarker(1,0,pulse);
  drawEntryMarker(5,0,pulse);
  drawEntryMarker(8,0,pulse);
  drawExitMarker(2,11);
  drawExitMarker(7,11);
}


function drawEntryMarker(col,row,pulse){
  const x=col*TILE+TILE/2, y=HUD_TOP+row*TILE+4;
  ctx.save();
  ctx.globalAlpha=pulse;
  ctx.fillStyle='#FF5722';
  ctx.beginPath();
  ctx.moveTo(x,y+14); ctx.lineTo(x-9,y); ctx.lineTo(x+9,y);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
  ctx.globalAlpha=1;
  ctx.restore();
}

function drawExitMarker(col,row){
  const x=col*TILE+TILE/2, y=HUD_TOP+row*TILE+TILE/2;
  rr(x-18,y-10,36,20,4,'#2E7D32','#fff',2);
  txt('EXIT',x,y,'bold 9px Nunito','#fff');
}

function drawPoliceTower(t){
  const x = t.col*TILE, y = HUD_TOP+t.row*TILE;
  const cx = x+TILE/2, cy = y+TILE/2;
  const lv = t.lv;

  // ── Colour palette (darkens slightly at higher levels) ──
  const stone  = lv===3 ? '#78909C' : lv===2 ? '#8DA0AA' : '#90A4AE';
  const dark   = lv===3 ? '#455A64' : lv===2 ? '#546E7A' : '#607D8B';
  const accent = lv===3 ? '#FFD740' : lv===2 ? '#90CAF9' : '#B0BEC5';

  // ── Base platform ──
  ctx.fillStyle=dark;
  ctx.fillRect(x+4,  y+TILE-10, TILE-8, 10);
  ctx.fillStyle=stone;
  ctx.fillRect(x+6,  y+TILE-12, TILE-12, 4);

  // ── Tower body ──
  const bodyX=x+10, bodyW=TILE-20, bodyY=y+18, bodyH=TILE-28;
  ctx.fillStyle=stone;
  ctx.fillRect(bodyX, bodyY, bodyW, bodyH);

  // Stone block texture — horizontal courses
  ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=0.5;
  [bodyY+8, bodyY+16, bodyY+24].forEach(ly=>{
    if(ly < bodyY+bodyH){
      ctx.beginPath(); ctx.moveTo(bodyX+1,ly); ctx.lineTo(bodyX+bodyW-1,ly); ctx.stroke();
    }
  });
  // Vertical block joints (staggered rows)
  [[bodyY,bodyY+8],[bodyY+8,bodyY+16],[bodyY+16,bodyY+24],[bodyY+24,bodyY+bodyH]]
    .forEach(([ry1,ry2],ri)=>{
      const off = ri%2 ? 0 : 7;
      for(let jx=bodyX+off; jx<bodyX+bodyW; jx+=14){
        ctx.beginPath(); ctx.moveTo(jx,ry1+1); ctx.lineTo(jx,ry2-1); ctx.stroke();
      }
    });

  // ── Battlements (merlons) ──
  const mW=6, mH=8, mGap=5;
  const mCount=3;
  const mTotalW=mCount*mW+(mCount-1)*mGap;
  const mStartX=cx-mTotalW/2;
  const mY=y+10;
  // Fill the crenel gaps (walkway between merlons)
  ctx.fillStyle=dark;
  ctx.fillRect(mStartX-1, mY+mH, mTotalW+2, 8);
  // Draw merlons
  ctx.fillStyle=stone;
  for(let m=0;m<mCount;m++){
    const mx=mStartX+m*(mW+mGap);
    ctx.fillRect(mx, mY, mW, mH);
    // Darker top lip
    ctx.fillStyle=accent==='#B0BEC5'?'rgba(0,0,0,0.12)':'rgba(255,255,255,0.1)';
    ctx.fillRect(mx, mY, mW, 2);
    ctx.fillStyle=stone;
  }
  // Battlement base bar
  ctx.fillStyle=dark;
  ctx.fillRect(bodyX, mY+mH+8, bodyW, 4);

  // ── Arrow slit (decorative) ──
  ctx.fillStyle='rgba(0,0,0,0.45)';
  ctx.fillRect(cx-1, bodyY+4, 2, 10);
  ctx.fillRect(cx-3, bodyY+7, 6, 3);

  // ── Rotating cannon barrel ──
  ctx.save();
  ctx.translate(cx, cy-2);
  ctx.rotate(t.ang);
  // Barrel body
  ctx.fillStyle=dark;
  ctx.beginPath(); ctx.roundRect(4, -2.5, TILE/2-6, 5, 2); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=0.5; ctx.stroke();
  // Barrel highlight stripe
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.fillRect(5, -2, TILE/2-8, 1.5);
  // Muzzle flash
  if(t.muzz>0){
    const a = t.muzz;
    ctx.fillStyle=`rgba(255,200,60,${a*0.95})`;
    ctx.beginPath(); ctx.arc(TILE/2-5, 0, 5+a*3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle=`rgba(255,255,180,${a*0.7})`;
    ctx.beginPath(); ctx.arc(TILE/2-5, 0, 2+a*1.5, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // ── Level indicator pips ──
  if(t.lv>1){
    for(let l=0;l<t.lv-1;l++){
      ctx.beginPath(); ctx.arc(cx-5+l*10, y+TILE-4, 2.5, 0, Math.PI*2);
      ctx.fillStyle='#FFD740'; ctx.fill();
    }
  }

  // ── Selected highlight ──
  if(G.selTower===t){
    ctx.strokeStyle='#FFD740'; ctx.lineWidth=2;
    ctx.setLineDash([4,4]);
    ctx.strokeRect(x+2, y+2, TILE-4, TILE-4);
    ctx.setLineDash([]);
  }
}

function drawTower(t){
  const x=t.col*TILE, y=HUD_TOP+t.row*TILE;
  const cx=x+TILE/2, cy=y+TILE/2;
  const def=TDEFS[t.type];

  if(t.type==='barricade'){
    rr(x+4,cy-9,TILE-8,18,3,'#5D4037','#3E2723',2);
    ctx.save();
    ctx.beginPath(); ctx.roundRect(x+4,cy-9,TILE-8,18,3); ctx.clip();
    ctx.fillStyle='#FFD740';
    for(let i=-2;i<8;i++) ctx.fillRect(x+4+i*9,cy-9,5,18);
    ctx.restore();
    ctx.strokeStyle='#3E2723'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(x+4,cy-9,TILE-8,18,3); ctx.stroke();
    return;
  }

  if(t.type==='tower'){
    drawPoliceTower(t);
    return;
  }

  // ── All other unit types: circle + icon ──
  ctx.beginPath(); ctx.arc(cx,cy,TILE/2-3,0,Math.PI*2);
  ctx.fillStyle=def.col; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=2; ctx.stroke();

  if(t.type!=='horse'){
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(t.ang);
    rr(2,-3,TILE/2-4,6,2, t.muzz>0?'#FFD740':'rgba(255,255,255,0.6)', null);
    if(t.muzz>0){
      ctx.beginPath(); ctx.arc(TILE/2-2,0,6,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,215,64,${t.muzz*0.9})`; ctx.fill();
    }
    ctx.restore();
  }

  ctx.font='16px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(def.ico,cx,cy);

  if(t.lv>1){
    for(let l=0;l<t.lv-1;l++){
      ctx.beginPath(); ctx.arc(cx-5+l*10,cy+TILE/2-7,3,0,Math.PI*2);
      ctx.fillStyle='#FFD740'; ctx.fill();
    }
  }

  if(G.selTower===t){
    ctx.beginPath(); ctx.arc(cx,cy,TILE/2-1,0,Math.PI*2);
    ctx.strokeStyle='#FFD740'; ctx.lineWidth=3;
    ctx.setLineDash([5,4]); ctx.stroke(); ctx.setLineDash([]);
  }
}

// ══════════════════════════════
//  PIXEL ART: RUNNING PROTESTER
// ══════════════════════════════

// Each "pixel" = 2×2 actual pixels. Character spans:
//   x: -4 to +4 units (16px wide)
//   y: -5 to +5 units (20px tall, centered on enemy position)
// 4-frame run cycle: 0=L contact, 1=pass, 2=R contact, 3=pass

function buildProteserSprite(frame, raging) {
  const f = frame % 4;

  const skin  = '#FFCBA4';
  const hair  = '#3D2B1F';
  const shirt = raging ? '#FF1744' : '#FF6B35';
  const pants = '#37474F';
  const shoe  = '#111111';
  const eye   = '#0a0a0a';

  const B = []; // [x, y, w, h, color]
  const a = (x,y,w,h,c) => B.push([x,y,w,h,c]);

  // ── HEAD (y = -5 to -1) ──────────────────────────────────
  a(-1,-5,  3,1, hair);        // top hair tuft
  a(-2,-4,  5,1, hair);        // hair brim
  a(-2,-3,  5,2, skin);        // face area
  // Eyes — shift when raging (angry squint → narrower)
  a(-1,-3,  1,1, eye);         // left eye
  a( 1,-3,  1,1, eye);         // right eye
  if (raging) {
    a(-2,-3, 1,1, '#2a0000');  // angry left brow pixel
    a( 2,-3, 1,1, '#2a0000');  // angry right brow pixel
  }
  a(-2,-1,  5,1, skin);        // chin / neck blend

  // ── TORSO (y = 0 to +2) ──────────────────────────────────
  a(-3, 0,  6,3, shirt);       // body shirt

  // ── ARMS (opposing leg swing) ────────────────────────────
  // Frame 0: L arm forward (up), R arm back (down)
  // Frame 2: R arm forward (up), L arm back (down)
  // Frames 1,3: neutral
  const lAY = f===0 ? -1 : f===2 ?  1 : 0;
  const rAY = f===0 ?  1 : f===2 ? -1 : 0;
  a(-4, lAY, 1,2, skin);       // left arm
  a( 3, rAY, 1,2, skin);       // right arm

  // ── LEGS (4-frame stride) ─────────────────────────────────
  // Vertical bounce: body is 1 unit higher on passing frames (1,3)
  const bounce = (f===1||f===3) ? -1 : 0;

  if (f === 0) {               // L foot contacts (forward), R swings back
    a(-2, 3+bounce, 1,2, pants); a(-3, 5+bounce, 2,1, shoe);  // left
    a( 1, 3+bounce, 1,2, pants); a( 1, 5+bounce, 2,1, shoe);  // right
  } else if (f === 1) {        // passing — feet together, body up
    a(-2, 3+bounce, 1,2, pants); a(-2, 5+bounce, 1,1, shoe);
    a( 1, 3+bounce, 1,2, pants); a( 2, 5+bounce, 1,1, shoe);
  } else if (f === 2) {        // R foot contacts (forward), L swings back
    a( 1, 3+bounce, 1,2, pants); a( 2, 5+bounce, 2,1, shoe);  // right
    a(-2, 3+bounce, 1,2, pants); a(-2, 5+bounce, 2,1, shoe);  // left
  } else {                     // passing other side
    a(-1, 3+bounce, 1,2, pants); a(-1, 5+bounce, 1,1, shoe);
    a( 0, 3+bounce, 1,2, pants); a( 1, 5+bounce, 1,1, shoe);
  }

  return B;
}

function drawRunningProtester(cx, cy, frame, faceRight, raging, hitFlash) {
  const s = 2;
  const B = buildProteserSprite(frame, raging);

  ctx.save();
  ctx.translate(Math.round(cx), Math.round(cy));
  if (!faceRight) ctx.scale(-1, 1);

  // ── Pass 1: dark outline (each block expanded 1px outward) ──
  ctx.fillStyle = '#1A0800';
  for (const [x,y,w,h] of B) {
    ctx.fillRect(x*s - 1, y*s - 1, w*s + 2, h*s + 2);
  }

  // ── Pass 2: actual pixel colors ───────────────────────────
  for (const [x,y,w,h,c] of B) {
    ctx.fillStyle = hitFlash > 0
      ? lerpColor(c, '#FFFFFF', hitFlash * 0.75)
      : c;
    ctx.fillRect(x*s, y*s, w*s, h*s);
  }

  ctx.restore();
}

// Simple linear interpolation between two hex colors
function lerpColor(hex1, hex2, t) {
  const r1=parseInt(hex1.slice(1,3),16), g1=parseInt(hex1.slice(3,5),16), b1=parseInt(hex1.slice(5,7),16);
  const r2=parseInt(hex2.slice(1,3),16), g2=parseInt(hex2.slice(3,5),16), b2=parseInt(hex2.slice(5,7),16);
  const r=Math.round(r1+(r2-r1)*t), g=Math.round(g1+(g2-g1)*t), b=Math.round(b1+(b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}


// ══════════════════════════════
//  PIXEL ART: MOLOTOV THROWER
// ══════════════════════════════

function drawMolotovThrower(cx, cy, faceRight, throwing, hitFlash) {
  const s = 2;

  const skin   = '#FFCBA4';
  const hair   = '#1A1A1A';   // long dark hair
  const mask   = '#2E2E2E';   // dark bandana mask
  const shirt  = '#FF8F00';   // orange jacket
  const pants  = '#4E342E';   // dark brown
  const shoe   = '#111';
  const bottle = '#88CC44';   // green bottle
  const flame  = '#FF6D00';

  const B = [];
  const a = (x,y,w,h,c) => B.push([x,y,w,h,c]);

  // ── Hair (long, hangs behind) ──
  a(-2,-6, 4,1, hair);     // top
  a(-2,-5, 5,2, hair);     // sides wide
  a( 3,-3, 2,6, hair);     // right flowing tail
  a(-3,-3, 1,5, hair);     // left strand

  // ── Face / mask ──
  a(-2,-5, 4,3, skin);     // forehead + eyes area
  a(-1,-4, 1,1, '#222');   // left eye
  a( 1,-4, 1,1, '#222');   // right eye
  a(-2,-2, 4,2, mask);     // bandana covers nose/mouth

  // ── Torso ──
  a(-3, 0, 6,3, shirt);

  // ── Throwing arm (raised when throwing, down otherwise) ──
  if(throwing){
    // Arm raised overhead holding bottle
    a( 3,-3, 1,3, skin);   // arm up
    a( 3,-5, 2,3, bottle); // bottle
    // Flame on bottle top
    a( 3,-7, 2,2, flame);
    a( 4,-8, 1,1, '#FFD740');
    // Other arm out for balance
    a(-4, 1, 1,2, skin);
  } else {
    // Arm at side
    a( 3, 0, 1,2, skin);
    a(-4, 0, 1,2, skin);
  }

  // ── Legs (simple stance — thrower is stopped) ──
  a(-2, 3, 2,3, pants);
  a( 1, 3, 2,3, pants);
  a(-2, 6, 2,1, shoe);
  a( 1, 6, 2,1, shoe);

  // Draw outline pass then color pass
  ctx.save();
  ctx.translate(Math.round(cx), Math.round(cy));
  if(!faceRight) ctx.scale(-1,1);

  ctx.fillStyle='#1A0800';
  for(const [x,y,w,h] of B)
    ctx.fillRect(x*s-1, y*s-1, w*s+2, h*s+2);

  for(const [x,y,w,h,c] of B){
    ctx.fillStyle = hitFlash>0 ? lerpColor(c,'#FFFFFF',hitFlash*0.75) : c;
    ctx.fillRect(x*s, y*s, w*s, h*s);
  }
  ctx.restore();
}

// ── Fire zone (lingering after molotov impact) ──
function drawFireZone(f){
  const a = Math.min(1, f.life/f.ml);
  const flicker = 0.7 + 0.3*Math.sin(f.flicker);
  // Scorched ground ring
  ctx.beginPath(); ctx.arc(f.x, f.y, f.r*0.9, 0, Math.PI*2);
  ctx.fillStyle=`rgba(30,10,0,${a*0.35})`; ctx.fill();
  // Outer flame ring
  ctx.beginPath(); ctx.arc(f.x, f.y, f.r*flicker, 0, Math.PI*2);
  ctx.fillStyle=`rgba(255,80,0,${a*0.28})`; ctx.fill();
  // Inner hot core
  ctx.beginPath(); ctx.arc(f.x, f.y, f.r*0.45*flicker, 0, Math.PI*2);
  ctx.fillStyle=`rgba(255,210,50,${a*0.55})`; ctx.fill();
  // Small flame spikes
  for(let i=0;i<5;i++){
    const ang = f.flicker*0.7 + i*(Math.PI*2/5);
    const fr = f.r*(0.5+0.3*Math.sin(f.flicker+i));
    const fx2 = f.x + Math.cos(ang)*fr*0.7;
    const fy2 = f.y + Math.sin(ang)*fr*0.7 - 4*a;
    ctx.beginPath();
    ctx.moveTo(fx2-3,fy2+5); ctx.lineTo(fx2,fy2-6*a); ctx.lineTo(fx2+3,fy2+5);
    ctx.fillStyle=`rgba(255,140,0,${a*0.7})`; ctx.fill();
  }
}

// ── Molotov projectile in flight ──
function drawMolotovProjectile(mp){
  ctx.save();
  ctx.translate(mp.x, mp.y);
  ctx.rotate(mp.rot);
  // Bottle body
  ctx.fillStyle='#88CC44';
  ctx.beginPath(); ctx.roundRect(-3,-7,6,10,2); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=0.5; ctx.stroke();
  // Neck
  ctx.fillStyle='#6AAA30';
  ctx.fillRect(-1.5,-10,3,4);
  // Rag/flame
  ctx.fillStyle='#FF6D00';
  ctx.beginPath(); ctx.arc(0,-11,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFD740';
  ctx.beginPath(); ctx.arc(0,-11,1.5,0,Math.PI*2); ctx.fill();
  // Arc trail
  ctx.restore();
}

function drawEnemy(e){
  if(e.dead||e.escaped) return;
  const {x,y,r}=e;

  // Ground shadow (all types)
  ctx.beginPath();
  ctx.ellipse(x,y+r+1,r*0.75,r*0.28,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.fill();

  if (e.type === 'protester') {
    // ── PIXEL ART PROTESTER ──────────────────────────────
    const faceRight = Math.cos(e.ang) >= 0;
    const frame     = Math.floor(e.animT) % 4;
    if (e.raging) {
      const grd=ctx.createRadialGradient(x,y,r*0.2,x,y,r*2);
      grd.addColorStop(0,'rgba(255,30,0,0.45)');
      grd.addColorStop(1,'rgba(255,30,0,0)');
      ctx.beginPath(); ctx.arc(x,y,r*2,0,Math.PI*2);
      ctx.fillStyle=grd; ctx.fill();
    }
    drawRunningProtester(x, y, frame, faceRight, e.raging, e.flash);

  } else if (e.type === 'molotov') {
    // ── PIXEL ART MOLOTOV THROWER ────────────────────────
    const faceRight = Math.cos(e.ang) >= 0;
    drawMolotovThrower(x, y, faceRight, e.throwing, e.flash);

  } else {
    // ── CIRCLE ENEMIES (other types) ────────────────────
    if(e.raging){
      const grd=ctx.createRadialGradient(x,y,r*0.3,x,y,r*2);
      grd.addColorStop(0,'rgba(255,50,0,0.35)');
      grd.addColorStop(1,'rgba(255,50,0,0)');
      ctx.beginPath(); ctx.arc(x,y,r*2,0,Math.PI*2);
      ctx.fillStyle=grd; ctx.fill();
    }
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=e.col; ctx.fill();
    if(e.flash>0){
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${e.flash*0.8})`; ctx.fill();
    }
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.strokeStyle=e.raging?'#FF1744':'rgba(0,0,0,0.5)';
    ctx.lineWidth=e.raging?2.5:1.5; ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.arc(x-r*0.3,y-r*0.08,r*0.18,0,Math.PI*2);
    ctx.arc(x+r*0.3,y-r*0.08,r*0.18,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath(); ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1.5;
    if(e.raging){ ctx.arc(x,y+r*0.22,r*0.32,0.15,Math.PI-0.15); }
    else{ ctx.moveTo(x-r*0.28,y+r*0.3); ctx.lineTo(x+r*0.28,y+r*0.3); }
    ctx.stroke();
  }

  // ── HP BAR (all types) ────────────────────────────────
  const topY = (e.type==='protester'||e.type==='molotov') ? y-14 : y-r;
  const barY = topY - 7;
  const bw=r*2.2, bx=x-r*1.1, bh=4;
  rr(bx,barY,bw,bh,2,'#1a1a1a',null);
  const hpP=e.hp/e.maxHP;
  const hcol=hpP>0.6?'#43A047':hpP>0.3?'#FDD835':'#E53935';
  if(hpP>0) rr(bx,barY,bw*hpP,bh,2,hcol,null);
  if(e.rage>0){
    rr(bx,barY+5,bw,3,1,'#1a1a1a',null);
    rr(bx,barY+5,bw*(e.rage/100),3,1,'#E91E63',null);
  }

  // ── STATUS ICONS ─────────────────────────────────────
  const iconY=(e.type==='protester'?y-12:y-r)-14;
  if(e.stunT>0){
    ctx.font='13px serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText('💫',x,iconY);
  } else if(e.slowT>0){
    ctx.font='11px serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText('🐢',x,iconY);
  }
}

function drawProjectile(p){
  // Trail
  const dx=p.x-p.ox, dy=p.y-p.oy, dd=Math.hypot(dx,dy);
  if(dd>2){
    ctx.beginPath();
    ctx.moveTo(p.x,p.y);
    ctx.lineTo(p.x-(dx/dd)*12, p.y-(dy/dd)*12);
    ctx.strokeStyle=p.pcol+'88'; ctx.lineWidth=p.pr*1.5; ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(p.x,p.y,p.pr,0,Math.PI*2);
  ctx.fillStyle=p.pcol; ctx.fill();
}

function drawParticle(p){
  const a=p.life/p.ml;
  ctx.beginPath(); ctx.arc(p.x,p.y,p.r*a,0,Math.PI*2);
  ctx.fillStyle=p.col+(Math.floor(a*255).toString(16).padStart(2,'0'));
  ctx.fill();
}

// ── Submenu geometry helper (shared between draw and tap) ──
function panelGeom(t){
  const pw=200, ph=148;
  let bx=t.col*TILE+(TILE-pw)/2;
  bx=Math.max(2, Math.min(bx, W-pw-2));
  let by=HUD_TOP+t.row*TILE-ph-8;
  if(by<HUD_TOP+2) by=HUD_TOP+t.row*TILE+TILE+4;
  by=Math.min(by, HUD_TOP+ROWS*TILE-ph-4);
  return {px:bx, py:by, pw, ph};
}

function drawUpgradePanel(){
  if(!G.selTower) return;
  const t=G.selTower;
  const def=TDEFS[t.type];
  const {px,py,pw,ph}=panelGeom(t);

  // Panel shadow + background
  ctx.save(); ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=14;
  rr(px,py,pw,ph,10,'#0A1540','#3949AB',2);
  ctx.restore();

  // ── Title ──────────────────────────────────────────────
  const ico = t.type==='tower'?'🏰':'👮';
  const lvLabel = t.waterCannon?'Water Cannon':t.lv===2?'Live Rounds':'Standard';
  txt(`${ico} ${def.name}`, px+pw/2, py+14, '700 11px Nunito', '#E8EAF6');
  txt(lvLabel, px+pw/2, py+27, '600 8px Nunito',
    t.waterCannon?'#64B5F6':t.lv===2?'#FFCDD2':'#90CAF9');

  // HP pips
  if(t.maxHP<999){
    const pipW=10, pipGap=4;
    const totalW=t.maxHP*(pipW+pipGap)-pipGap;
    let pipX=px+pw/2-totalW/2;
    for(let i=0;i<t.maxHP;i++){
      rr(pipX+i*(pipW+pipGap), py+36, pipW, 6, 2,
        i<t.hp?'#43A047':'#1a1a1a', null);
    }
  }

  // Button layout — must match handleTap exactly
  const btnH=28, btnW=pw-16, btnX=px+8, gap=5;
  const repY  = py+50;
  const upgY  = repY+btnH+gap;
  const remY  = upgY+btnH+gap;

  // ── REPAIR ──
  const rc=t.repairCost();
  const needsRepair = rc>0;
  const canRepair   = needsRepair && G.currency>=rc;
  rr(btnX, repY, btnW, btnH, 6,
    !needsRepair?'#1C2833': canRepair?'#1B5E20':'#37474F',
    !needsRepair?'#2E4057': canRepair?'#43A047':'#546E7A', 1.5);
  txt(!needsRepair?'✓ Full Health':`🔧 Repair  $${rc}`,
    px+pw/2, repY+btnH/2, '700 9.5px Nunito',
    !needsRepair?'#4CAF50': canRepair?'#fff':'#78909C');

  // ── UPGRADE ──
  if(t.type==='barricade'){
    rr(btnX, upgY, btnW, btnH, 6, '#1A1A2E','#283593',1.5);
    txt('No upgrades', px+pw/2, upgY+btnH/2, '700 9.5px Nunito','#5C6BC0');
  } else if(t.lv<3){
    const uc=t.upgCost(), canUpg=G.currency>=uc;
    rr(btnX, upgY, btnW, btnH, 6,
      canUpg?'#0D3B6E':'#1A237E', canUpg?'#1565C0':'#283593', 1.5);
    txt(`⬆ ${t.upgName()}  $${uc}`, px+pw/2, upgY+btnH/2,
      '700 9.5px Nunito', canUpg?'#fff':'#5C6BC0');
  } else {
    rr(btnX, upgY, btnW, btnH, 6,'rgba(255,215,64,0.08)','#FFD740',1.5);
    txt('★ MAX LEVEL', px+pw/2, upgY+btnH/2, '700 9.5px Nunito','#FFD740');
  }

  // ── REMOVE ──
  const sv=Math.floor(TDEFS[t.type].cost*0.4 + (t.lv-1)*20);
  rr(btnX, remY, btnW, btnH, 6,'#2a1010','#7f1d1d',1.5);
  txt(`🗑 Remove  +$${sv}`, px+pw/2, remY+btnH/2,'700 9.5px Nunito','#EF9A9A');
}

// ── Water Cannon beam drawing ──
function drawWaterBeams(){
  for(const t of G.towers){
    if(!t.waterCannon||!t.beamActive||!t.beamTarget) continue;
    if(t.beamTarget.dead||t.beamTarget.escaped) continue;
    const tx=t.beamTarget.x, ty=t.beamTarget.y;
    const dx=tx-t.x, dy=ty-t.y, dd=Math.hypot(dx,dy);
    const nx=dy/dd, ny=-dx/dd;
    const wave=Math.sin(G.pulseT*14)*3;

    // Outer glow
    ctx.save();
    ctx.globalAlpha=0.25;
    ctx.strokeStyle='#90CAF9'; ctx.lineWidth=10; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(t.x,t.y); ctx.lineTo(tx,ty); ctx.stroke();

    // Mid beam
    ctx.globalAlpha=0.55;
    ctx.strokeStyle='#42A5F5'; ctx.lineWidth=5;
    ctx.beginPath();
    ctx.moveTo(t.x+nx*wave,t.y+ny*wave);
    ctx.quadraticCurveTo(
      t.x+dx*0.5+nx*wave*2, t.y+dy*0.5+ny*wave*2,
      tx, ty
    );
    ctx.stroke();

    // Bright core
    ctx.globalAlpha=0.9;
    ctx.strokeStyle='#E3F2FD'; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(t.x+nx*wave*0.5,t.y+ny*wave*0.5);
    ctx.quadraticCurveTo(
      t.x+dx*0.5+nx*wave, t.y+dy*0.5+ny*wave,
      tx, ty
    );
    ctx.stroke();

    // Splash at impact
    const sp=0.5+0.5*Math.sin(G.pulseT*18);
    ctx.globalAlpha=0.7*sp;
    ctx.fillStyle='#90CAF9';
    ctx.beginPath(); ctx.arc(tx,ty,6+sp*4,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    ctx.restore();

    // Water droplets
    for(let i=0;i<3;i++){
      const dp=(G.pulseT*0.8+i*0.33)%1;
      const wx=t.x+dx*dp+nx*(Math.sin(dp*Math.PI*4+i)*5);
      const wy=t.y+dy*dp+ny*(Math.sin(dp*Math.PI*4+i)*5);
      ctx.beginPath(); ctx.arc(wx,wy,2,0,Math.PI*2);
      ctx.fillStyle=`rgba(144,202,249,${0.8*(1-dp)})`; ctx.fill();
    }
  }
}

// ══════════════════════════════
//  NIGHT / EFFECTS OVERLAYS
// ══════════════════════════════

function drawNight(){
  if(G.nightLvl<=0) return;
  ctx.fillStyle=`rgba(5,10,40,${G.nightLvl*0.55})`;
  ctx.fillRect(0,HUD_TOP,W,ROWS*TILE);
  // Siren flicker on high night
  if(G.nightLvl>0.4){
    const siren=0.5+0.5*Math.sin(G.pulseT*12);
    ctx.fillStyle=`rgba(255,0,0,${siren*G.nightLvl*0.12})`;
    ctx.fillRect(0,HUD_TOP,W/2,ROWS*TILE);
    ctx.fillStyle=`rgba(0,100,255,${(1-siren)*G.nightLvl*0.12})`;
    ctx.fillRect(W/2,HUD_TOP,W/2,ROWS*TILE);
  }
}

function drawChopperFX(){
  if(G.chopperFX<=0) return;
  const a=Math.min(1,G.chopperFX)*0.25;
  ctx.fillStyle=`rgba(30,60,200,${a})`;
  ctx.fillRect(0,HUD_TOP,W,ROWS*TILE);
  // Spotlight sweep
  const sx=W/2+Math.sin(G.pulseT*1.2)*100;
  const sy=HUD_TOP+ROWS*TILE/2+Math.cos(G.pulseT*0.9)*80;
  const grd=ctx.createRadialGradient(sx,sy,10,sx,sy,90);
  grd.addColorStop(0,'rgba(255,255,200,0.18)');
  grd.addColorStop(1,'rgba(255,255,200,0)');
  ctx.fillStyle=grd;
  ctx.beginPath(); ctx.arc(sx,sy,90,0,Math.PI*2); ctx.fill();
}

function drawFlashFX(){
  if(G.flashFX<=0) return;
  ctx.fillStyle=`rgba(255,240,150,${G.flashFX*0.7})`;
  ctx.fillRect(0,0,W,H);
}

function drawFloatingMsgs(){
  for(const m of G.msgs){
    const a=Math.min(1,m.life/m.ml*2);
    ctx.globalAlpha=a;
    txtOut(m.txt,m.x,m.y,'bold 13px Bangers',m.col,'rgba(0,0,0,0.7)',3);
    ctx.globalAlpha=1;
  }
}

// ══════════════════════════════
//  WAVE TRANSITION BANNER
// ══════════════════════════════

function drawWaveBanner(){
  if(G.waveTrans<=0) return;
  const a=Math.min(1,G.waveTrans);
  const wave=WAVES[G.waveIdx];
  const mult=Math.pow(2,G.waveIdx);
  const cy=HUD_TOP+ROWS*TILE*0.42;
  ctx.globalAlpha=a;
  ctx.fillStyle='rgba(13,27,94,0.9)';
  ctx.fillRect(0,cy-40,W,80);
  ctx.fillStyle='rgba(255,215,64,0.3)';
  ctx.fillRect(0,cy-40,W,2);
  ctx.fillRect(0,cy+38,W,2);
  txtOut(wave.name.toUpperCase(),W/2,cy-10,'bold 38px Bangers','#FFD740','#000',5);
  txt(wave.sub,W/2,cy+12,'600 11px Nunito','#90CAF9');
  // Multiplier badge
  if(mult>1){
    const tag=`${mult}× ENEMIES`;
    const tagCol=mult>=8?'#FF1744':mult>=4?'#FF6D00':'#FFB300';
    txtOut(tag,W/2,cy+28,'700 10px Nunito',tagCol,'#000',3);
  }
  ctx.globalAlpha=1;
}

// ══════════════════════════════
//  SCREENS
// ══════════════════════════════

function drawTitle(){
  ctx.fillStyle='rgba(5,5,20,0.8)';
  ctx.fillRect(0,0,W,H);

  // Glow blobs
  const t=G.pulseT;
  [[60,200,'rgba(255,87,34,0.07)'],[300,350,'rgba(21,101,192,0.07)']].forEach(([bx,by,bc])=>{
    const grd=ctx.createRadialGradient(bx,by,20,bx,by,160);
    grd.addColorStop(0,bc); grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
  });

  txtOut('MOSTLY',W/2,H*0.2,'bold 58px Bangers','#FFD740','#000',6);
  txtOut('PEACEFUL',W/2,H*0.31,'bold 58px Bangers','#FF5722','#000',6);

  txt('BROTEST EDITION',W/2,H*0.35,'700 13px Nunito','#90CAF9');

  ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(30,H*0.4); ctx.lineTo(W-30,H*0.4); ctx.stroke();

  txt('Defend the city as the protest',W/2,H*0.44,'600 11px Nunito','#aaa');
  txt('escalates from peaceful to total chaos.',W/2,H*0.48,'600 11px Nunito','#aaa');

  // Start button pulse
  const bp=0.85+0.15*Math.sin(t*2.5);
  ctx.save(); ctx.scale(1+(1-bp)*0.02,bp);
  const btnY=H*0.56, btnX=W/2;
  rr(btnX-95,btnY/bp-6,190,52,12,'#FF5722','#FFD740',3);
  txtOut('▶  TAP TO START',W/2,(btnY+20)/bp,'bold 22px Bangers','#fff','#BF360C',3);
  ctx.restore();

  txt('5 Escalating Waves  •  Rage System  •  Ability Strikes',W/2,H*0.74,'600 9px Nunito','#546E7A');
  txt('Place towers  •  Tap tower to upgrade  •  Sell for 60%',W/2,H*0.79,'600 8.5px Nunito','#455A64');
}

function drawEndScreen(){
  const win=G.state==='win';
  ctx.fillStyle='rgba(0,0,0,0.78)';
  ctx.fillRect(0,0,W,H);

  const title=win?'CITY SECURED!':'CITY FELL!';
  const tc=win?'#FFD740':'#FF5722';
  txtOut(title,W/2,H*0.28,'bold 46px Bangers',tc,'#000',6);

  const lines=[
    `Waves Survived: ${G.waveIdx}/${WAVES.length}`,
    `Enemies Stopped: ${G.kills}`,
    `City Stability: ${Math.round(G.stability)}%`,
    `Enemies Escaped: ${G.escapedTotal}`,
  ];
  lines.forEach((l,i)=>{
    txt(l,W/2,H*0.4+i*22,'600 12px Nunito','#ddd');
  });

  const by=H*0.66;
  rr(W/2-90,by,180,50,10,'#1565C0','#42A5F5',2);
  txtOut('PLAY AGAIN',W/2,by+25,'bold 26px Bangers','#fff','#0D47A1',3);
}

// ══════════════════════════════
//  RENDER
// ══════════════════════════════

function render(){
  ctx.clearRect(0,0,W,H);

  drawMap();
  drawHoverCell();
  drawSelectedTowerRange();

  // Fire zones (behind towers and enemies)
  for(const f of G.fires) drawFireZone(f);

  for(const t of G.towers) drawTower(t);
  // Tower HP bars
  for(const t of G.towers){
    if(t.maxHP>=999||t.hp===t.maxHP) continue;
    const bw=TILE-8, bx=t.col*TILE+4, by=HUD_TOP+t.row*TILE+2, bh=4;
    rr(bx,by,bw,bh,2,'#1a1a1a',null);
    const hp=t.hp/t.maxHP;
    rr(bx,by,bw*hp,bh,2,hp>0.5?'#43A047':'#E53935',null);
    if(t.hitFlash>0){
      ctx.fillStyle=`rgba(255,80,0,${t.hitFlash*0.5})`;
      ctx.fillRect(t.col*TILE,HUD_TOP+t.row*TILE,TILE,TILE);
    }
  }

  drawWaterBeams();

  for(const e of G.enemies) drawEnemy(e);
  for(const mp of G.mprojs) drawMolotovProjectile(mp);
  for(const p of G.projs) drawProjectile(p);
  for(const p of G.parts) drawParticle(p);

  drawNight();
  drawChopperFX();

  drawTopHUD();
  drawBottomHUD();

  drawUpgradePanel();
  drawWaveBanner();
  drawFlashFX();
  drawFloatingMsgs();

  if(G.state==='title') drawTitle();
  if(G.state==='gameover'||G.state==='win') drawEndScreen();
}

// ══════════════════════════════
//  INPUT
// ══════════════════════════════

function screenPos(e){
  const rect=canvas.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return {
    x:(src.clientX-rect.left)*(W/rect.width),
    y:(src.clientY-rect.top)*(H/rect.height)
  };
}

function handleTap(px,py){
  AUDIO.init();  // async — kicks off decode on first user gesture

  // Mute toggle — small icon bottom-left of top bar
  if(px<28 && py>HUD_TOP-30 && py<HUD_TOP){ AUDIO.muted=!AUDIO.muted; return; }

  if(G.state==='title'){ startGame(); return; }
  if(G.state==='gameover'||G.state==='win'){ resetGame(); return; }
  if(G.state!=='playing') return;

  const gameBottom=HUD_TOP+ROWS*TILE;

  // Bottom HUD
  if(py>=gameBottom){
    const ry=py-gameBottom;
    // Unit buttons
    const bw=70,bh=55,gap=4;
    const sx=(W-(UNIT_KEYS.length*(bw+gap)-gap))/2;
    if(ry<6+bh){
      for(let i=0;i<UNIT_KEYS.length;i++){
        const bx=sx+i*(bw+gap);
        if(px>=bx&&px<=bx+bw){ G.selUnit=UNIT_KEYS[i]; G.selTower=null; return; }
      }
    }
    // Ability buttons
    const aw=90,aGap=8;
    const ax=(W-(AKEYS.length*(aw+aGap)-aGap))/2;
    if(ry>=HUD_BOT-28){
      for(let i=0;i<AKEYS.length;i++){
        const bx=ax+i*(aw+aGap);
        if(px>=bx&&px<=bx+aw){ useAbility(AKEYS[i]); return; }
      }
    }
    return;
  }

  // ── Tower submenu taps ──
  if(G.selTower){
    const t=G.selTower;
    const {px:mpx, py:mpy, pw:mpw, ph:mph}=panelGeom(t);
    // Check tap is inside panel
    if(px>=mpx && px<=mpx+mpw && py>=mpy && py<=mpy+mph){
      const btnH=28, btnW=mpw-16, btnX=mpx+8, gap=5;
      const repY = mpy+50;
      const upgY = repY+btnH+gap;
      const remY = upgY+btnH+gap;

      // Repair
      if(py>=repY && py<=repY+btnH){
        const rc=t.repairCost();
        if(rc>0 && G.currency>=rc){
          G.currency-=rc; t.hp=t.maxHP;
          addMsg('🔧 Repaired!', t.x, t.y-28, '#A5D6A7');
        }
        return;
      }
      // Upgrade
      if(py>=upgY && py<=upgY+btnH){
        if(t.type!=='barricade' && t.lv<3 && G.currency>=t.upgCost()){
          G.currency-=t.upgCost();
          const name=t.upgName();
          t.upgrade();
          addMsg(`⬆ ${name}!`, t.x, t.y-28, '#C8E6C9');
        }
        return;
      }
      // Remove
      if(py>=remY && py<=remY+btnH){
        const sv=Math.floor(TDEFS[t.type].cost*0.4 + (t.lv-1)*20);
        G.currency+=sv;
        G.towers=G.towers.filter(tw=>tw!==t);
        G.selTower=null;
        addMsg(`Removed +$${sv}`, px, py-20, '#FFD740');
        return;
      }
      return; // tapped panel but not a button — consume event, don't deselect
    }
  }

  // Game area
  if(py>=HUD_TOP&&py<gameBottom){
    const col=Math.floor(px/TILE);
    const row=Math.floor((py-HUD_TOP)/TILE);
    const hit=G.towers.find(t=>t.col===col&&t.row===row);
    if(hit){
      G.selTower=G.selTower===hit?null:hit;
      if(G.selTower) G.selUnit=null;
      return;
    }
    G.selTower=null;
    if(G.selUnit){
      const def=TDEFS[G.selUnit];
      if(canPlace(col,row)&&G.currency>=def.cost){
        G.currency-=def.cost;
        G.towers.push(new Tower(G.selUnit,col,row));
      }
    }
  }
}

function handleMove(px,py){
  if(G.state!=='playing') return;
  if(py>=HUD_TOP&&py<HUD_TOP+ROWS*TILE&&G.selUnit){
    G.hoverCell={col:Math.floor(px/TILE),row:Math.floor((py-HUD_TOP)/TILE)};
  } else {
    G.hoverCell=null;
  }
}

canvas.addEventListener('touchstart',e=>{e.preventDefault();const p=screenPos(e);handleTap(p.x,p.y);},{passive:false});
canvas.addEventListener('touchmove', e=>{e.preventDefault();const p=screenPos(e);handleMove(p.x,p.y);},{passive:false});
canvas.addEventListener('click',    e=>{const p=screenPos(e);handleTap(p.x,p.y);});
canvas.addEventListener('mousemove',e=>{const p=screenPos(e);handleMove(p.x,p.y);});

// ══════════════════════════════
//  MAIN LOOP
// ══════════════════════════════

function loop(ts){
  const dt=Math.min((ts-G.lastTime)/1000,0.05);
  G.lastTime=ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

// ── BOOT ──
setupCanvas();
resetGame();
requestAnimationFrame(ts=>{ G.lastTime=ts; loop(ts); });
</script>
